<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VirtGochi</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>VirtGochi</h1>

    <section id="setup" class="panel">
      <h2>Crear mascota</h2>
      <label>Tipo</label>
      <select id="petType"></select>

      <label>Nombre (max 6)</label>
      <input id="petName" maxlength="6" />

      <button id="createBtn">Crear huevo</button>
      <p class="small">Eclosiona entre 10 y 60 minutos.</p>
    </section>

    <section id="game" class="panel hidden">
      <h2 id="title">Huevo</h2>
      <canvas id="screen" width="240" height="160"></canvas>
      <p id="status"></p>
      <p id="alerts" class="small"></p>

      <div id="stats" class="stats hidden"></div>

      <div id="actions" class="actions hidden">
        <button data-action="feed">🍔 Dar comida</button>
        <button data-action="water">💧 Dar agua</button>
        <button data-action="play">🎮 Jugar</button>
        <button data-action="clean">🧼 Limpiar</button>
        <button data-action="medicine">💊 Medicina</button>
        <button data-action="sleep">😴 Dormir / Despertar</button>
        <button data-action="discipline">📢 Disciplinar</button>
        <button data-action="praise">👏 Elogiar</button>
      </div>

      <button id="resetBtn" class="danger">Reiniciar mascota</button>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
